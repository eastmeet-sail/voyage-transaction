services:
  postgresql:
    image: postgres:17
    container_name: voyage-postgresql
    ports:
      - "${POSTGRE_DB_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRE_DB_NAME}
      POSTGRES_USER: ${POSTGRE_DB_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRE_DB_PASSWORD}
    volumes:
      - voyage-postgresql-data:/var/lib/postgresql/data

  mysql:
    image: mysql:8.4
    container_name: voyage-mysql
    ports:
      - "${MYSQL_DB_PORT}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DB_NAME}
      MYSQL_USER: ${MYSQL_DB_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_DB_PASSWORD}
    volumes:
      - voyage-mysql-data:/var/lib/mysql

volumes:
  voyage-postgresql-data:
  voyage-mysql-data: